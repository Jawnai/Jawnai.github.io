<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NanoPack - Fast & Secure File Compressor</title>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Phosphor Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    

    <!-- Custom CSS -->
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="background-blobs">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
    </div>

    <main class="app-container">
        <header class="app-header">
            <div class="header-top">
                <div class="logo">
                    <i class="ph-fill ph-package"></i>
                    <h1>NanoPack</h1>
                </div>
                <div class="nav-portal">
                    <button id="portalBtn" class="portal-btn" title="System Hub">
                        <i class="ph ph-squares-four"></i>
                    </button>
                    <div id="portalMenu" class="portal-menu hidden">
                        <div class="menu-header">System Hub</div>
                        <a href="../pdfstudio/" class="menu-item">
                            <i class="ph ph-file-pdf"></i>
                            <span>PDF Studio</span>
                        </a>
                        <a href="../ex-pro/" class="menu-item">
                            <i class="ph ph-exam"></i>
                            <span>Ex-Pro</span>
                        </a>
                        <a href="../random/" class="menu-item">
                            <i class="ph ph-shuffle"></i>
                            <span>Random System</span>
                        </a>
                        <div class="menu-divider"></div>
                        <a href="../" class="menu-item">
                            <i class="ph ph-house"></i>
                            <span>Home</span>
                        </a>
                    </div>
                </div>
            </div>
            <p class="subtitle">Compress your files instantly. All processing happens in your browser for maximum privacy.</p>
        </header>

        <div class="upload-section">
            <div id="dropzone" class="dropzone">
                <input type="file" id="fileInput" multiple hidden>
                <div class="dropzone-content">
                    <div class="icon-container">
                        <i class="ph ph-upload-simple"></i>
                    </div>
                    <h3>Drag & Drop files here</h3>
                    <p>or <button id="browseBtn" class="text-btn">browse files</button> from your computer</p>
                </div>
            </div>
        </div>

        <div class="files-section hidden" id="filesSection">
            <div class="section-header">
                <h3>Selected Files <span id="fileCount" class="badge">0</span></h3>
                <button id="clearBtn" class="clear-btn">
                    <i class="ph ph-trash"></i> Clear All
                </button>
            </div>
            <div class="files-list" id="filesList">
                <!-- File items will be injected here via JS -->
            </div>
            
            <div class="action-footer">
                <button id="downloadAllBtn" class="primary-btn">
                    <i class="ph ph-download-simple"></i> Download All Files
                </button>
            </div>
        </div>
        
        <div class="loading-overlay hidden" id="loadingOverlay">
            <div class="spinner"></div>
            <p id="loadingText">Processing files...</p>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
